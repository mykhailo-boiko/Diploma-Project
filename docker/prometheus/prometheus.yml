global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8080"]
    metrics_path: /metrics

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:8001"]
    metrics_path: /metrics

  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:8002"]
    metrics_path: /metrics

  - job_name: "inventory-service"
    static_configs:
      - targets: ["inventory-service:8003"]
    metrics_path: /metrics

  - job_name: "logistics-service"
    static_configs:
      - targets: ["logistics-service:8004"]
    metrics_path: /metrics

  - job_name: "analytics-service"
    static_configs:
      - targets: ["analytics-service:8005"]
    metrics_path: /metrics

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:8006"]
    metrics_path: /metrics

  - job_name: "simulator-service"
    static_configs:
      - targets: ["simulator-service:8007"]
    metrics_path: /metrics

  - job_name: "mcp-host"
    static_configs:
      - targets: ["mcp-host:8090"]
    metrics_path: /metrics
